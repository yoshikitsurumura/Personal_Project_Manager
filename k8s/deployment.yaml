apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-project-manager
  labels:
    app: personal-project-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: personal-project-manager
  template:
    metadata:
      labels:
        app: personal-project-manager
    spec:
      containers:
        - name: web
          image: your-registry/personal-project-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: personal-project-manager-env
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
